    <script>
      // Håndter redirect fra 404.html (GitHub Pages SPA fix)
      const redirect = sessionStorage.getItem('redirect');
      if (redirect) {
        sessionStorage.removeItem('redirect');
        // Brug replaceState så back-knappen virker korrekt
        window.history.replaceState(null, '', '/fagai' + redirect);
      }
    </script>
